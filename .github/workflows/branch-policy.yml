name: Branch policy

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  enforce-branch-flow:
    name: Branch policy
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR base branch
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail

          echo "PR: ${HEAD_REF} -> ${BASE_REF}"

          if [ "${BASE_REF}" = "master" ]; then
            if [ "${HEAD_REF}" != "develop" ]; then
              echo "::error::Only release PRs from develop may target master."
              exit 1
            fi
            echo "Release PR (develop -> master) is allowed."
            exit 0
          fi

          if [ "${BASE_REF}" = "develop" ]; then
            if [ "${HEAD_REF}" = "master" ]; then
              echo "::error::master must not be merged back into develop."
              exit 1
            fi
            echo "Feature PR targeting develop is allowed."
            exit 0
          fi

          echo "::error::PRs must target develop (day-to-day work) or master (release PRs from develop only)."
          exit 1
